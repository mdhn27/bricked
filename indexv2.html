<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bricked — Virtual LEGO Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --red: #E63946; --radius: 8px; --radius-lg: 12px; }

  body.light {
    --bg: #f0ede8; --panel: #ffffff; --panel2: #f5f2ee;
    --border: rgba(0,0,0,0.09); --text: #1a1a2e; --muted: rgba(26,26,46,0.45);
    --yellow: #c28a00; --scene-bg: #e8e4de;
  }
  body.dark {
    --bg: #1a1a2e; --panel: #16213e; --panel2: #0f3460;
    --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: rgba(232,232,240,0.45);
    --yellow: #FFD60A; --scene-bg: #1a1a2e;
  }

  html, body { height: 100%; overflow: hidden; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; transition:background 0.2s,color 0.2s; }

  #header { height:52px; min-height:52px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; gap:8px; z-index:10; transition:background 0.2s; overflow-x:auto; }
  .logo { display:flex; align-items:center; gap:7px; font-weight:800; font-size:16px; letter-spacing:-0.3px; user-select:none; flex-shrink:0; }
  .logo-brick { width:26px; height:15px; background:var(--red); border-radius:3px; position:relative; }
  .logo-brick::before,.logo-brick::after { content:''; position:absolute; top:-5px; width:8px; height:6px; background:var(--red); border-radius:3px 3px 0 0; }
  .logo-brick::before { left:3px; } .logo-brick::after { right:3px; }
  .logo span { color:var(--red); }
  .hsep { width:1px; height:26px; background:var(--border); flex-shrink:0; }
  .spacer { flex:1; min-width:4px; }

  .hbtn { display:flex; align-items:center; gap:4px; padding:5px 9px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:11px; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; transition:all 0.15s; white-space:nowrap; flex-shrink:0; }
  .hbtn:hover { filter:brightness(1.1); border-color:rgba(128,128,128,0.35); }
  .hbtn:disabled { opacity:0.35; cursor:not-allowed; }
  .hbtn.red { background:var(--red); border-color:var(--red); color:white; }
  .hbtn.red:hover { filter:brightness(0.9); }
  .hbtn.blue { background:rgba(69,123,157,0.18); border-color:rgba(69,123,157,0.4); color:#457B9D; }
  .hbtn svg { width:13px; height:13px; }
  #cnt { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; white-space:nowrap; flex-shrink:0; }
  .icon-btn { width:30px; height:30px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all 0.15s; flex-shrink:0; }
  .icon-btn:hover { filter:brightness(1.1); }

  #workspace { flex:1; display:flex; overflow:hidden; }

  #sidebar { width:205px; min-width:205px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; overflow-x:hidden; transition:background 0.2s; }
  #sidebar::-webkit-scrollbar { width:3px; }
  #sidebar::-webkit-scrollbar-thumb { background:rgba(128,128,128,0.2); border-radius:4px; }

  .ss { padding:9px 11px; border-bottom:1px solid var(--border); }
  .sl { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }

  .trow { display:flex; gap:5px; }
  .tbtn { flex:1; padding:6px 4px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:11px; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; text-align:center; transition:all 0.15s; }
  .tbtn:hover { filter:brightness(1.08); }
  .tbtn.active { background:var(--red); border-color:var(--red); color:white; }

  .rrow { display:flex; align-items:center; gap:5px; }
  .rdisplay { flex:1; text-align:center; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; color:var(--yellow); background:rgba(128,128,0,0.08); border:1px solid rgba(128,128,0,0.2); border-radius:var(--radius); padding:5px 0; }
  .rbtn,.lbtn { width:27px; height:27px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-family:'Nunito',sans-serif; }
  .rbtn:hover,.lbtn:hover { filter:brightness(1.1); }

  #sg { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
  .sbtn { padding:6px 4px; background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:10px; font-family:'Nunito',sans-serif; font-weight:600; cursor:pointer; text-align:center; transition:all 0.15s; line-height:1.3; }
  .sbtn:hover { filter:brightness(1.08); }
  .sbtn.active { background:rgba(230,57,70,0.18); border-color:var(--red); color:var(--red); }

  #cg { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
  .csw { aspect-ratio:1; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:transform 0.1s,border-color 0.1s; }
  .csw:hover { transform:scale(1.12); }
  .csw.active { border-color:var(--red); transform:scale(1.08); }

  .lrow { display:flex; align-items:center; gap:6px; }
  .lnum { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:var(--yellow); width:28px; text-align:center; }

  #sta { padding:9px 11px; font-size:11px; color:var(--muted); line-height:2; font-family:'Space Mono',monospace; }
  #sta b { color:var(--text); font-weight:700; }

  .sact { padding:9px 11px; display:flex; flex-direction:column; gap:5px; margin-top:auto; border-top:1px solid var(--border); }
  .abtn { padding:6px 10px; border-radius:var(--radius); font-size:11px; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; text-align:center; transition:all 0.15s; border:1px solid var(--border); background:var(--panel2); color:var(--muted); }
  .abtn:hover { color:var(--text); filter:brightness(1.08); }
  .abtn.danger:hover { background:rgba(230,57,70,0.15); border-color:rgba(230,57,70,0.4); color:#E63946; }

  #canvas-wrap { flex:1; position:relative; overflow:hidden; }
  #canvas { display:block; width:100%; height:100%; }

  #hints { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:10px; background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:5px 14px; font-size:11px; color:var(--muted); pointer-events:none; white-space:nowrap; opacity:0.85; }
  #hints span { color:var(--text); font-weight:700; }

  #toast { position:fixed; bottom:18px; right:18px; background:var(--panel); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:var(--radius-lg); font-size:12px; font-weight:600; display:none; z-index:9999; pointer-events:none; max-width:300px; box-shadow:0 4px 20px rgba(0,0,0,0.25); }

  #mo { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; align-items:center; justify-content:center; }
  #mo.open { display:flex; }
  #md { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; max-width:520px; width:90%; max-height:80vh; display:flex; flex-direction:column; gap:12px; box-shadow:0 8px 40px rgba(0,0,0,0.3); }
  #md h2 { font-size:15px; font-weight:800; }
  #mt { overflow-y:auto; flex:1; }
  #mt table { width:100%; border-collapse:collapse; font-size:12px; }
  #mt th { text-align:left; padding:6px 8px; border-bottom:2px solid var(--border); color:var(--muted); font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:0.05em; }
  #mt td { padding:7px 8px; border-bottom:1px solid var(--border); }
  #mt .sw { width:14px; height:14px; border-radius:3px; display:inline-block; vertical-align:middle; margin-right:5px; border:1px solid rgba(128,128,128,0.2); }
  .mbtns { display:flex; gap:8px; justify-content:flex-end; }
  .mbtn { padding:7px 13px; border-radius:var(--radius); font-size:12px; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; border:1px solid var(--border); background:var(--panel2); color:var(--text); transition:all 0.15s; }
  .mbtn:hover { filter:brightness(1.1); }
  .mbtn.red { background:var(--red); border-color:var(--red); color:white; }
</style>
</head>
<body class="dark">

<div id="header">
  <div class="logo"><div class="logo-brick"></div>Brick<span>ed</span></div>
  <div class="hsep"></div>
  <button class="hbtn" id="ub" onclick="undo()" disabled>
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6h7a4 4 0 0 1 0 8H5"/><path d="M2 6l3-3M2 6l3 3"/></svg>
    <span data-t="undo">Rückgängig</span>
  </button>
  <button class="hbtn" id="rb" onclick="redo()" disabled>
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 6H7a4 4 0 0 0 0 8h4"/><path d="M14 6l-3-3M14 6l-3 3"/></svg>
    <span data-t="redo">Wiederholen</span>
  </button>
  <div class="spacer"></div>
  <div id="cnt">0 <span data-t="bricks">Steine</span></div>
  <button class="hbtn" onclick="saveProject()">💾 <span data-t="save">Speichern</span></button>
  <button class="hbtn" onclick="loadProject()">📂 <span data-t="load">Laden</span></button>
  <button class="hbtn blue" onclick="showParts()">📋 <span data-t="parts">Teileliste</span></button>
  <button class="hbtn" onclick="exportPrintPlate()" title="Alle Steine einzeln auf Druckplatte">🖨 <span data-t="plate">Druckplatte</span></button>
  <button class="hbtn red" onclick="exportSTL()">⬇ STL</button>
  <div class="hsep"></div>
  <button class="icon-btn" id="lang-btn" onclick="toggleLang()" title="Sprache / Language">🇩🇪</button>
  <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Theme">🌙</button>
</div>

<div id="workspace">
  <div id="sidebar">
    <div class="ss">
      <div class="sl" data-t="tool">Werkzeug</div>
      <div class="trow">
        <button class="tbtn active" id="tp" onclick="setTool('place')">✚ <span data-t="place">Setzen</span></button>
        <button class="tbtn" id="tr" onclick="setTool('remove')">✕ <span data-t="remove">Löschen</span></button>
      </div>
    </div>
    <div class="ss">
      <div class="sl" data-t="rotation">Rotation</div>
      <div class="rrow">
        <button class="rbtn" onclick="rotateLeft()" title="Q">↺</button>
        <div class="rdisplay" id="rd">0°</div>
        <button class="rbtn" onclick="rotateRight()" title="E">↻</button>
      </div>
    </div>
    <div class="ss">
      <div class="sl" data-t="stoneType">Steinform</div>
      <div id="sg"></div>
    </div>
    <div class="ss">
      <div class="sl" data-t="color">Farbe</div>
      <div id="cg"></div>
    </div>
    <div class="ss">
      <div class="sl" data-t="layer">Ebene (Höhe)</div>
      <div class="lrow">
        <button class="lbtn" onclick="changeLayer(-1)">−</button>
        <div class="lnum" id="ln">1</div>
        <button class="lbtn" onclick="changeLayer(1)">+</button>
        <span style="font-size:10px;color:var(--muted);margin-left:2px;">[ / ]</span>
      </div>
    </div>
    <div id="sta">
      <span data-t="bricks">Steine</span>: <b id="st">0</b><br>
      <span data-t="layers">Ebenen</span>: <b id="sl2">0</b><br>
      <span data-t="volume">Volumen</span>: <b id="sv">0</b> cm³
    </div>
    <div class="sact">
      <button class="abtn danger" onclick="clearAll()">🗑 <span data-t="clear">Alles löschen</span></button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="hints">
      <span data-t="hc">Klick</span>: <span data-t="hp">setzen/löschen</span> &nbsp;
      <span>RMB+Drag</span>: <span data-t="hr">drehen</span> &nbsp;
      <span>Scroll</span>: zoom &nbsp; <span>Q/E</span>: rot &nbsp;
      <span>[/]</span>: <span data-t="hl">Ebene</span> &nbsp; <span>Ctrl+Z/Y</span>: undo/redo
    </div>
  </div>
</div>

<!-- Parts modal -->
<div id="mo" onclick="if(event.target===this)closeMod()">
  <div id="md">
    <h2 data-t="partsTitle">Teileliste</h2>
    <div id="mt"></div>
    <div class="mbtns">
      <button class="mbtn" onclick="closeMod()" data-t="close">Schließen</button>
      <button class="mbtn red" onclick="exportCSV()" data-t="csv">Als CSV exportieren</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fi" accept=".bricked,.brickforge,.json" style="display:none" onchange="loadFile(event)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── i18n ──
const I = {
  de:{
    undo:'Rückgängig',redo:'Wiederholen',save:'Speichern',load:'Laden',
    parts:'Teileliste',plate:'Druckplatte',tool:'Werkzeug',place:'Setzen',remove:'Löschen',
    rotation:'Rotation',stoneType:'Steinform',color:'Farbe',layer:'Ebene (Höhe)',
    bricks:'Steine',layers:'Ebenen',volume:'Volumen',clear:'Alles löschen',
    hc:'Klick',hp:'setzen/löschen',hr:'drehen',hl:'Ebene',
    partsTitle:'Teileliste',close:'Schließen',csv:'Als CSV exportieren',
    noStones:'Keine Steine vorhanden!',occ:'Position belegt!',
    saved:'Projekt gespeichert!',loaded:'Geladen',
    stlDone:'STL exportiert',plateDone:'Druckplatte exportiert',tris:'Dreiecke',
    colH:['Farbe','Typ','Größe','Anzahl'],
    sn:{'1x1':'1×1 Noppe','1x2':'1×2 Stein','1x3':'1×3 Stein','1x4':'1×4 Balken',
        '1x6':'1×6 Langer','2x2':'2×2 Block','2x3':'2×3 Stein','2x4':'2×4 Ziegel',
        '2x6':'2×6 Brett','2x8':'2×8 Groß','3x4':'3×4 Block','4x4':'4×4 Platte',
        '1x1f':'1×1 Flach','1x2f':'1×2 Flach','2x2f':'2×2 Flach','2x4f':'2×4 Flach',
        '1x1r':'1×1 Rund','2x2r':'2×2 Rund',
        '1x2s':'1×2 Schräg','2x4s':'2×4 Schräg'}
  },
  en:{
    undo:'Undo',redo:'Redo',save:'Save',load:'Load',
    parts:'Parts List',plate:'Print Plate',tool:'Tool',place:'Place',remove:'Remove',
    rotation:'Rotation',stoneType:'Brick Type',color:'Color',layer:'Layer (Height)',
    bricks:'Bricks',layers:'Layers',volume:'Volume',clear:'Clear All',
    hc:'Click',hp:'place/remove',hr:'rotate',hl:'Layer',
    partsTitle:'Parts List',close:'Close',csv:'Export as CSV',
    noStones:'No bricks placed!',occ:'Position occupied!',
    saved:'Project saved!',loaded:'Loaded',
    stlDone:'STL exported',plateDone:'Print plate exported',tris:'triangles',
    colH:['Color','Type','Size','Count'],
    sn:{'1x1':'1×1 Stud','1x2':'1×2 Brick','1x3':'1×3 Brick','1x4':'1×4 Beam',
        '1x6':'1×6 Long','2x2':'2×2 Block','2x3':'2×3 Brick','2x4':'2×4 Brick',
        '2x6':'2×6 Plank','2x8':'2×8 Large','3x4':'3×4 Block','4x4':'4×4 Plate',
        '1x1f':'1×1 Plate','1x2f':'1×2 Plate','2x2f':'2×2 Plate','2x4f':'2×4 Plate',
        '1x1r':'1×1 Round','2x2r':'2×2 Round',
        '1x2s':'1×2 Slope','2x4s':'2×4 Slope'}
  }
};
let lang='de';
const T = k => (I[lang][k]||k);
const TN = id => (I[lang].sn||{})[id]||id;

function applyLang(){
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.getAttribute('data-t');
    el.textContent=T(k);
  });
  document.getElementById('lang-btn').textContent=lang==='de'?'🇩🇪':'🇬🇧';
  document.getElementById('hints').innerHTML=
    `<span>${T('hc')}</span>: ${T('hp')} &nbsp;<span>RMB+Drag</span>: ${T('hr')} &nbsp;`+
    `<span>Scroll</span>: zoom &nbsp;<span>Q/E</span>: rot &nbsp;`+
    `<span>[/]</span>: ${T('hl')} &nbsp;<span>Ctrl+Z/Y</span>: undo/redo`;
  buildStoneBtns(); updateStats();
}
function toggleLang(){ lang=lang==='de'?'en':'de'; applyLang(); }

// ── Theme ──
let theme='dark';
function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  document.body.classList.remove('dark','light');
  document.body.classList.add(theme);
  document.getElementById('theme-btn').textContent=theme==='dark'?'🌙':'☀️';
  if(scene){
    const c=theme==='dark'?0x1a1a2e:0xe8e4de;
    scene.background=new THREE.Color(c);
    scene.fog=new THREE.Fog(c,1800,3500);
    rebuildGrid();
  }
}

// ── LEGO dimensions (mm) — real-brick compatible ──
const S={
  STUD:8.0, PLATE:3.2, BRICK:9.6,
  WALL:1.6,
  STUD_R:2.4,   // real stud outer radius
  STUD_H:1.8,   // stud height
  TUBE_R:3.26,  // anti-stud tube outer radius
  TUBE_W:0.9,   // anti-stud tube wall thickness
};

// ── Stone types ──
const ST=[
  {id:'1x1', sx:1,sz:1,hp:3},
  {id:'1x2', sx:1,sz:2,hp:3},
  {id:'1x3', sx:1,sz:3,hp:3},
  {id:'1x4', sx:1,sz:4,hp:3},
  {id:'1x6', sx:1,sz:6,hp:3},
  {id:'2x2', sx:2,sz:2,hp:3},
  {id:'2x3', sx:2,sz:3,hp:3},
  {id:'2x4', sx:2,sz:4,hp:3},
  {id:'2x6', sx:2,sz:6,hp:3},
  {id:'2x8', sx:2,sz:8,hp:3},
  {id:'3x4', sx:3,sz:4,hp:3},
  {id:'4x4', sx:4,sz:4,hp:3},
  {id:'1x1f',sx:1,sz:1,hp:1},
  {id:'1x2f',sx:1,sz:2,hp:1},
  {id:'2x2f',sx:2,sz:2,hp:1},
  {id:'2x4f',sx:2,sz:4,hp:1},
  {id:'1x1r',sx:1,sz:1,hp:3,round:true},
  {id:'2x2r',sx:2,sz:2,hp:3,round:true},
  {id:'1x2s',sx:1,sz:2,hp:3,slope:true},
  {id:'2x4s',sx:2,sz:4,hp:3,slope:true},
];

const COLORS=['#E63946','#E07020','#FFD60A','#2DC653','#1A936F','#457B9D','#1D3557','#9B5DE5','#F72585','#FFFFFF','#C8C8C8','#888888','#444444','#1a1a1a','#7B4F2E','#A8DADC','#CDBF88','#F4A261','#E9C46A','#264653'];

// ── State ──
let scene,camera,renderer,raycaster;
let bMeshes={}, bData={};
let hist=[], fut=[];
let curCol=COLORS[0], curTool='place', curLayer=1;
let curStone=ST[7], curRot=0;
let isRD=false, isDrag=false, prevM={x:0,y:0};
let camTh=0.5,camPh=0.75,camD=900;
let camTgt=new THREE.Vector3(0,0,0);
let ghost=null, gridH=[];
const occ={};

// ── Init ──
function init(){
  const cv=document.getElementById('canvas');
  const wr=document.getElementById('canvas-wrap');
  const W=wr.clientWidth,H=wr.clientHeight;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  scene.fog=new THREE.Fog(0x1a1a2e,1800,3500);
  camera=new THREE.PerspectiveCamera(42,W/H,1,5000);
  updateCam();
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  scene.add(new THREE.AmbientLight(0x8090b0,0.7));
  const sun=new THREE.DirectionalLight(0xfff5e0,1.1);
  sun.position.set(400,700,300); sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near=1; sun.shadow.camera.far=3000;
  sun.shadow.camera.left=sun.shadow.camera.bottom=-600;
  sun.shadow.camera.right=sun.shadow.camera.top=600;
  scene.add(sun);
  const fill=new THREE.DirectionalLight(0x4060ff,0.25);
  fill.position.set(-300,200,-400); scene.add(fill);
  raycaster=new THREE.Raycaster();
  rebuildGrid(); buildPalette(); buildStoneBtns(); buildGhost(); updateStats(); updUR();
  cv.addEventListener('mousedown',onMD);
  cv.addEventListener('mousemove',onMM);
  cv.addEventListener('mouseup',()=>{isDrag=false;isRD=false;});
  cv.addEventListener('contextmenu',e=>e.preventDefault());
  cv.addEventListener('wheel',onW,{passive:true});
  document.addEventListener('keydown',onK);
  window.addEventListener('resize',()=>{
    const W=wr.clientWidth,H=wr.clientHeight;
    camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
  });
  animate();
}

function updateCam(){
  const ph=Math.max(0.08,Math.min(Math.PI/2-0.05,camPh));
  camera.position.set(
    camTgt.x+camD*Math.sin(ph)*Math.sin(camTh),
    camTgt.y+camD*Math.cos(ph),
    camTgt.z+camD*Math.sin(ph)*Math.cos(camTh)
  );
  camera.lookAt(camTgt);
}
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}

function layerY(l){ return (l-1)*(S.BRICK-S.STUD_H); }

function rebuildGrid(){
  gridH.forEach(g=>scene.remove(g)); gridH=[];
  const sz=32, dark=theme==='dark';
  const g=new THREE.GridHelper(sz*S.STUD,sz,dark?0x334466:0xbbbbbb,dark?0x253355:0xcccccc);
  g.position.y=layerY(curLayer)-0.3; scene.add(g); gridH.push(g);
  let fl=scene.getObjectByName('rf'); if(fl) scene.remove(fl);
  fl=new THREE.Mesh(new THREE.PlaneGeometry(sz*S.STUD*2,sz*S.STUD*2),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
  fl.rotation.x=-Math.PI/2; fl.position.y=layerY(curLayer); fl.name='rf'; scene.add(fl);
}

function bk(x,y,z){return `${x},${y},${z}`;}
function eDims(s,r){ const is=r===90||r===270; return is?{sx:s.sz,sz:s.sx,hp:s.hp,round:s.round,slope:s.slope}:{sx:s.sx,sz:s.sz,hp:s.hp,round:s.round,slope:s.slope}; }

function oCells(gx,gy,gz,sx,sz,hp){
  const sp=Math.ceil(hp/3),c=[];
  for(let x=gx;x<gx+sx;x++) for(let z=gz;z<gz+sz;z++) for(let y=gy;y<gy+sp;y++) c.push(bk(x,y,z));
  return c;
}
function canP(gx,gy,gz,sx,sz,hp){return oCells(gx,gy,gz,sx,sz,hp).every(c=>!occ[c]);}
function regO(key,gx,gy,gz,sx,sz,hp){oCells(gx,gy,gz,sx,sz,hp).forEach(c=>{occ[c]=key;});}
function unrO(gx,gy,gz,sx,sz,hp){oCells(gx,gy,gz,sx,sz,hp).forEach(c=>{delete occ[c];});}

// ── Mesh ──
function mkMat(col,rough,op){
  return new THREE.MeshStandardMaterial({color:new THREE.Color(col),roughness:rough,metalness:0.04,transparent:op<1,opacity:op});
}

function mkBrick(sx,sz,hp,col,op=1,round=false,slope=false){
  const g=new THREE.Group();
  const W=sx*S.STUD, D=sz*S.STUD, fH=hp*S.PLATE, bH=fH-S.STUD_H;
  const gh=op<1;

  if(round){
    const r=Math.min(W,D)/2-0.15;
    const body=new THREE.Mesh(new THREE.CylinderGeometry(r,r,bH,20),mkMat(col,0.42,op));
    body.position.set(W/2,bH/2,D/2); body.castShadow=true; g.add(body);
    const stud=new THREE.Mesh(new THREE.CylinderGeometry(S.STUD_R,S.STUD_R,S.STUD_H,16),mkMat(col,0.35,op));
    stud.position.set(W/2,bH+S.STUD_H/2,D/2); stud.castShadow=true; g.add(stud);
  } else if(slope){
    // Slope brick: wedge shape
    const hw=W/2, hd=D/2;
    const pts=[new THREE.Vector2(0,0),new THREE.Vector2(D,0),new THREE.Vector2(D,bH),new THREE.Vector2(0,S.PLATE)];
    const shape=new THREE.Shape(pts);
    const extOpts={depth:W,bevelEnabled:false};
    const geo=new THREE.ExtrudeGeometry(shape,extOpts);
    const mesh=new THREE.Mesh(geo,mkMat(col,0.42,op));
    mesh.rotation.y=Math.PI/2;
    mesh.position.set(W,0,0);
    mesh.castShadow=true; g.add(mesh);
    // stud on thick end only
    const studMat=mkMat(col,0.35,op);
    const studGeo=new THREE.CylinderGeometry(S.STUD_R,S.STUD_R,S.STUD_H,16);
    for(let xi=0;xi<sx;xi++){
      const st=new THREE.Mesh(studGeo,studMat);
      st.position.set((xi+0.5)*S.STUD,S.PLATE+S.STUD_H/2,(0.5)*S.STUD);
      g.add(st);
    }
  } else {
    const wt=S.WALL;
    // Four outer walls (full body height)
    [[W,bH,wt, W/2,bH/2,wt/2],[W,bH,wt, W/2,bH/2,D-wt/2],
     [wt,bH,D-2*wt, wt/2,bH/2,D/2],[wt,bH,D-2*wt, W-wt/2,bH/2,D/2]
    ].forEach(([w,h,d,x,y,z])=>{
      const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mkMat(col,0.42,op));
      m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; g.add(m);
    });
    // Top plate
    const tp=new THREE.Mesh(new THREE.BoxGeometry(W,wt,D),mkMat(col,0.35,op));
    tp.position.set(W/2,bH-wt/2,D/2); g.add(tp);
    // Bottom rim — open center (4 segments, no face in middle = real LEGO)
    [[W,wt,wt, W/2,wt/2,wt/2],[W,wt,wt, W/2,wt/2,D-wt/2],
     [wt,wt,D-2*wt, wt/2,wt/2,D/2],[wt,wt,D-2*wt, W-wt/2,wt/2,D/2]
    ].forEach(([w,h,d,x,y,z])=>{
      const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mkMat(col,0.42,op));
      m.position.set(x,y,z); g.add(m);
    });
    // Studs on top
    const sGeo=new THREE.CylinderGeometry(S.STUD_R,S.STUD_R,S.STUD_H,16);
    for(let xi=0;xi<sx;xi++) for(let zi=0;zi<sz;zi++){
      const s=new THREE.Mesh(sGeo,mkMat(col,0.32,op));
      s.position.set((xi+0.5)*S.STUD,bH+S.STUD_H/2,(zi+0.5)*S.STUD);
      s.castShadow=true; g.add(s);
    }
    // Anti-stud tubes inside bottom cavity — correct for all brick sizes
    if(!gh&&hp===3){
      const tH=bH-2*wt;
      const tGeo=new THREE.CylinderGeometry(S.TUBE_R,S.TUBE_R,tH,16);
      const iGeo=new THREE.CylinderGeometry(S.TUBE_R-S.TUBE_W,S.TUBE_R-S.TUBE_W,tH+0.1,16);
      const darkMat=new THREE.MeshStandardMaterial({color:new THREE.Color(col).lerp(new THREE.Color(0),0.4),roughness:0.7,metalness:0.04});
      function addTube(cx,cz){
        const to=new THREE.Mesh(tGeo,mkMat(col,0.5,1));
        to.position.set(cx,wt+tH/2,cz); g.add(to);
        const ti=new THREE.Mesh(iGeo,darkMat);
        ti.position.set(cx,wt+tH/2,cz); g.add(ti);
      }
      if(sx===1){
        // 1xN: one tube centered in X, between each pair of studs in Z
        for(let zi=1;zi<sz;zi++) addTube(0.5*S.STUD, zi*S.STUD);
      } else {
        // 2xN+: tubes at every interior stud-grid crossing
        for(let xi=1;xi<sx;xi++) for(let zi=1;zi<sz;zi++) addTube(xi*S.STUD, zi*S.STUD);
        // For 2-wide: also add tubes in the two outer columns between studs
        if(sx===2){
          for(let zi=1;zi<sz;zi++){
            addTube(0.5*S.STUD, zi*S.STUD);
            addTube(1.5*S.STUD, zi*S.STUD);
          }
        }
      }
    }
  }
  return g;
}

function buildGhost(){
  if(ghost) scene.remove(ghost);
  const {sx,sz,hp,round,slope}=eDims(curStone,curRot);
  ghost=mkBrick(sx,sz,hp,curCol,0.33,round,slope);
  ghost.visible=false; scene.add(ghost);
}

function updGhost(gx,gz){
  if(!ghost) return;
  const {sx,sz,hp}=eDims(curStone,curRot);
  ghost.position.set(gx*S.STUD,layerY(curLayer),gz*S.STUD);
  const ok=canP(gx,curLayer,gz,sx,sz,hp);
  ghost.traverse(m=>{if(m.isMesh&&m.material){m.material.color.set(ok?curCol:'#ff3333');m.material.opacity=ok?0.33:0.2;}});
}

function place(gx,gz,ph=true){
  const {sx,sz,hp,round,slope}=eDims(curStone,curRot);
  const gy=curLayer;
  if(!canP(gx,gy,gz,sx,sz,hp)){showToast(T('occ'));return false;}
  const key=bk(gx,gy,gz);
  const data={gx,gy,gz,sx,sz,hp,rot:curRot,color:curCol,type:curStone.id,round:!!round,slope:!!slope};
  const mesh=mkBrick(sx,sz,hp,curCol,1,round,slope);
  mesh.position.set(gx*S.STUD,layerY(gy),gz*S.STUD);
  scene.add(mesh); bMeshes[key]=mesh; bData[key]=data;
  regO(key,gx,gy,gz,sx,sz,hp);
  if(ph){hist.push({a:'place',key,data});fut=[];updUR();}
  updateStats(); return true;
}

function rmKey(key,ph=true){
  const d=bData[key]; if(!d) return false;
  scene.remove(bMeshes[key]); unrO(d.gx,d.gy,d.gz,d.sx,d.sz,d.hp);
  delete bMeshes[key]; delete bData[key];
  if(ph){hist.push({a:'remove',key,data:d});fut=[];updUR();}
  updateStats(); return true;
}

function rmAt(gx,gz,ly,ph=true){
  let key=bk(gx,ly,gz);
  if(!bData[key]){key=occ[bk(gx,ly,gz)];if(!key)return false;}
  return rmKey(key,ph);
}

function restB(d){
  const sv=[curCol,curLayer,curRot,curStone];
  curCol=d.color;curLayer=d.gy;curRot=d.rot||0;
  curStone=ST.find(s=>s.id===d.type)||ST[0];
  place(d.gx,d.gz,false);
  [curCol,curLayer,curRot,curStone]=sv;
}

function undo(){
  if(!hist.length)return;
  const e=hist.pop();
  if(e.a==='place'){rmKey(e.key,false);fut.push({a:'remove',key:e.key,data:e.data});}
  else{restB(e.data);fut.push({a:'place',key:e.key,data:e.data});}
  updUR();
}
function redo(){
  if(!fut.length)return;
  const e=fut.pop();
  if(e.a==='remove'){rmKey(e.key,false);hist.push({a:'remove',key:e.key,data:e.data});}
  else{restB(e.data);hist.push({a:'place',key:e.key,data:e.data});}
  updUR();
}
function updUR(){
  document.getElementById('ub').disabled=!hist.length;
  document.getElementById('rb').disabled=!fut.length;
}

function getPos(e){
  const cv=document.getElementById('canvas'),r=cv.getBoundingClientRect();
  const m=new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1,-((e.clientY-r.top)/r.height)*2+1);
  raycaster.setFromCamera(m,camera);
  const fl=scene.getObjectByName('rf'); if(!fl)return null;
  const hits=raycaster.intersectObject(fl); if(!hits.length)return null;
  const p=hits[0].point;
  return{gx:Math.floor(p.x/S.STUD),gz:Math.floor(p.z/S.STUD)};
}

function onMD(e){
  if(e.button===2){isRD=true;prevM={x:e.clientX,y:e.clientY};return;}
  if(e.button===0){
    isDrag=true;const pos=getPos(e);if(!pos)return;
    if(curTool==='place')place(pos.gx,pos.gz);else rmAt(pos.gx,pos.gz,curLayer);
  }
}
function onMM(e){
  if(isRD){
    camTh-=(e.clientX-prevM.x)*0.008;
    camPh=Math.max(0.08,Math.min(Math.PI/2-0.05,camPh-(e.clientY-prevM.y)*0.008));
    prevM={x:e.clientX,y:e.clientY};updateCam();return;
  }
  const pos=getPos(e);
  if(pos&&ghost){ghost.visible=curTool==='place';updGhost(pos.gx,pos.gz);}
  if(isDrag&&e.buttons===1&&pos){
    if(curTool==='place')place(pos.gx,pos.gz);else rmAt(pos.gx,pos.gz,curLayer);
  }
}
function onW(e){camD=Math.max(80,Math.min(2500,camD+e.deltaY));updateCam();}
function onK(e){
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'){e.preventDefault();undo();return;}
    if(e.key==='y'){e.preventDefault();redo();return;}
    if(e.key==='s'){e.preventDefault();saveProject();return;}
  }
  if(e.key==='q'||e.key==='Q')rotL();
  if(e.key==='e'||e.key==='E')rotR();
  if(e.key==='[')changeLayer(-1);
  if(e.key===']')changeLayer(1);
}

function setTool(t){
  curTool=t;
  ['place','remove'].forEach(id=>document.getElementById('t'+id[0]).classList.toggle('active',id===t));
  if(ghost)ghost.visible=t==='place';
}
function rotL(){curRot=(curRot-90+360)%360;document.getElementById('rd').textContent=curRot+'°';buildGhost();}
function rotR(){curRot=(curRot+90)%360;document.getElementById('rd').textContent=curRot+'°';buildGhost();}

function changeLayer(d){
  curLayer=Math.max(1,Math.min(30,curLayer+d));
  document.getElementById('ln').textContent=curLayer;
  rebuildGrid(); camTgt.y=layerY(curLayer)*0.4; updateCam();
}

function buildStoneBtns(){
  const g=document.getElementById('sg'); g.innerHTML='';
  ST.forEach(s=>{
    const b=document.createElement('button');
    b.className='sbtn'+(s===curStone?' active':'');
    b.id='s-'+s.id; b.textContent=TN(s.id);
    b.onclick=()=>{curStone=s;document.querySelectorAll('.sbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');buildGhost();};
    g.appendChild(b);
  });
}
function buildPalette(){
  const g=document.getElementById('cg');
  COLORS.forEach((c,i)=>{
    const sw=document.createElement('div');
    sw.className='csw'+(i===0?' active':'');
    sw.style.background=c; sw.title=c;
    sw.onclick=()=>{curCol=c;document.querySelectorAll('.csw').forEach(s=>s.classList.remove('active'));sw.classList.add('active');buildGhost();};
    g.appendChild(sw);
  });
}

function updateStats(){
  const tot=Object.keys(bData).length;
  const ly=tot?Math.max(...Object.values(bData).map(d=>d.gy)):0;
  const v=Object.values(bData).reduce((a,d)=>a+d.sx*S.STUD*d.sz*S.STUD*d.hp*S.PLATE/1000,0);
  document.getElementById('st').textContent=tot;
  document.getElementById('sl2').textContent=ly;
  document.getElementById('sv').textContent=v.toFixed(1);
  document.getElementById('cnt').textContent=tot+' '+T('bricks');
}

// ── Save/Load ──
function saveProject(){
  const pl=JSON.stringify({version:2,bricks:Object.values(bData)},null,2);
  dlBlob(new Blob([pl],{type:'application/json'}),'bricked_model.bricked');
  showToast(T('saved'));
}
function loadProject(){document.getElementById('fi').click();}
function loadFile(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      clearAll(false);
      d.bricks.forEach(b=>{
        const sv=[curCol,curLayer,curRot,curStone];
        curCol=b.color;curLayer=b.gy;curRot=b.rot||0;
        curStone=ST.find(s=>s.id===b.type)||ST[0];
        place(b.gx,b.gz,false);
        [curCol,curLayer,curRot,curStone]=sv;
      });
      hist=[];fut=[];updUR();
      showToast(T('loaded')+': '+d.bricks.length+' '+T('bricks'));
    }catch(err){showToast('Error loading file');}
  };
  r.readAsText(f); ev.target.value='';
}
function clearAll(ph=true){
  if(ph&&Object.keys(bData).length>0){hist.push({a:'clearAll',snap:JSON.parse(JSON.stringify(bData))});fut=[];}
  Object.keys(bMeshes).forEach(k=>scene.remove(bMeshes[k]));
  Object.keys(occ).forEach(c=>delete occ[c]);
  for(const k in bMeshes)delete bMeshes[k];
  for(const k in bData)delete bData[k];
  updateStats();updUR();
}

// ── Parts list ──
function showParts(){
  const en=Object.values(bData); if(!en.length){showToast(T('noStones'));return;}
  const gr={};
  en.forEach(d=>{const k=d.color+'|'+d.type;if(!gr[k])gr[k]={color:d.color,type:d.type,sx:d.sx,sz:d.sz,hp:d.hp,cnt:0};gr[k].cnt++;});
  const hd=I[lang].colH;
  let html=`<table><thead><tr>${hd.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  Object.values(gr).sort((a,b)=>b.cnt-a.cnt).forEach(g=>{
    html+=`<tr><td><span class="sw" style="background:${g.color}"></span>${g.color}</td><td>${TN(g.type)}</td><td>${g.sx}×${g.sz} (${g.hp===1?'flat':'brick'})</td><td><b>${g.cnt}</b></td></tr>`;
  });
  const tot=en.length;
  html+=`<tr style="border-top:2px solid var(--border)"><td colspan="3" style="font-weight:700">Total</td><td><b>${tot}</b></td></tr>`;

function closeMod(){document.getElementById('mo').classList.remove('open');}
function exportCSV(){
  const en=Object.values(bData);
  const gr={};
  en.forEach(d=>{const k=d.color+'|'+d.type;if(!gr[k])gr[k]={color:d.color,type:d.type,sx:d.sx,sz:d.sz,hp:d.hp,cnt:0};gr[k].cnt++;});
  let csv=I[lang].colH.join(',')+'\n';
  Object.values(gr).sort((a,b)=>b.cnt-a.cnt).forEach(g=>{

  });

}

// ── STL geometry ──
function mkSTL(tris){
  const buf=new ArrayBuffer(84+50*tris.length);
  const v=new DataView(buf);
  const h='Bricked — LEGO-compatible STL';
  for(let i=0;i<80;i++)v.setUint8(i,i<h.length?h.charCodeAt(i):0);
  v.setUint32(80,tris.length,true);
  tris.forEach((t,i)=>{
    const off=84+i*50;
    [t.n,...t.v].forEach((vec,vi)=>{
      v.setFloat32(off+vi*12,vec[0],true);
      v.setFloat32(off+vi*12+4,vec[1],true);
      v.setFloat32(off+vi*12+8,vec[2],true);
    });
    v.setUint16(off+48,0,true);
  });
  return buf;
}

function brickTris(d,ox,oy,oz){
  const {sx,sz,hp,round,slope}=d;
  const tris=[];
  const pt=(n,a,b,c)=>tris.push({n,v:[a,b,c]});

  function box(x0,y0,z0,w,h2,d2){
    const x1=x0+w,y1=y0+h2,z1=z0+d2;
    pt([0,0,-1],[x0,y0,z0],[x1,y1,z0],[x1,y0,z0]);pt([0,0,-1],[x0,y0,z0],[x0,y1,z0],[x1,y1,z0]);
    pt([0,0,1],[x0,y0,z1],[x1,y0,z1],[x1,y1,z1]);pt([0,0,1],[x0,y0,z1],[x1,y1,z1],[x0,y1,z1]);
    pt([-1,0,0],[x0,y0,z0],[x0,y0,z1],[x0,y1,z1]);pt([-1,0,0],[x0,y0,z0],[x0,y1,z1],[x0,y1,z0]);
    pt([1,0,0],[x1,y0,z0],[x1,y1,z1],[x1,y0,z1]);pt([1,0,0],[x1,y0,z0],[x1,y1,z0],[x1,y1,z1]);
    pt([0,-1,0],[x0,y0,z0],[x1,y0,z1],[x0,y0,z1]);pt([0,-1,0],[x0,y0,z0],[x1,y0,z0],[x1,y0,z1]);
    pt([0,1,0],[x0,y1,z0],[x0,y1,z1],[x1,y1,z1]);pt([0,1,0],[x0,y1,z0],[x1,y1,z1],[x1,y1,z0]);
  }
  function cyl(cx,cz,y0,y1,r,sg=20){
    const ps=Array.from({length:sg},(_,i)=>{const a=i/sg*Math.PI*2;return[cx+Math.cos(a)*r,cz+Math.sin(a)*r];});
    for(let i=0;i<sg;i++){
      const a=ps[i],b=ps[(i+1)%sg];
      pt([0,1,0],[cx,y1,cz],[a[0],y1,a[1]],[b[0],y1,b[1]]);
      pt([0,-1,0],[cx,y0,cz],[b[0],y0,b[1]],[a[0],y0,a[1]]);
      const nx=Math.cos((i+.5)/sg*Math.PI*2),nz=Math.sin((i+.5)/sg*Math.PI*2);
      pt([nx,0,nz],[a[0],y0,a[1]],[b[0],y1,b[1]],[a[0],y1,a[1]]);
      pt([nx,0,nz],[a[0],y0,a[1]],[b[0],y0,b[1]],[b[0],y1,b[1]]);
    }
  }
  function tube(cx,cz,y0,y1,ro,ri,sg=20){
    const po=Array.from({length:sg},(_,i)=>{const a=i/sg*Math.PI*2;return[cx+Math.cos(a)*ro,cz+Math.sin(a)*ro];});
    const pi2=Array.from({length:sg},(_,i)=>{const a=i/sg*Math.PI*2;return[cx+Math.cos(a)*ri,cz+Math.sin(a)*ri];});
    for(let i=0;i<sg;i++){
      const oa=po[i],ob=po[(i+1)%sg],ia=pi2[i],ib=pi2[(i+1)%sg];
      pt([0,1,0],[oa[0],y1,oa[1]],[ib[0],y1,ib[1]],[ob[0],y1,ob[1]]);pt([0,1,0],[oa[0],y1,oa[1]],[ia[0],y1,ia[1]],[ib[0],y1,ib[1]]);
      pt([0,-1,0],[oa[0],y0,oa[1]],[ob[0],y0,ob[1]],[ib[0],y0,ib[1]]);pt([0,-1,0],[oa[0],y0,oa[1]],[ib[0],y0,ib[1]],[ia[0],y0,ia[1]]);
      const nx=Math.cos((i+.5)/sg*Math.PI*2),nz=Math.sin((i+.5)/sg*Math.PI*2);
      pt([nx,0,nz],[oa[0],y0,oa[1]],[ob[0],y1,ob[1]],[oa[0],y1,oa[1]]);pt([nx,0,nz],[oa[0],y0,oa[1]],[ob[0],y0,ob[1]],[ob[0],y1,ob[1]]);
      pt([-nx,0,-nz],[ia[0],y0,ia[1]],[ia[0],y1,ia[1]],[ib[0],y1,ib[1]]);pt([-nx,0,-nz],[ia[0],y0,ia[1]],[ib[0],y1,ib[1]],[ib[0],y0,ib[1]]);
    }
  }

  const W=sx*S.STUD,D=sz*S.STUD,fH=hp*S.PLATE,bH=fH-S.STUD_H,wt=S.WALL;

  if(round){
    const r=Math.min(W,D)/2-0.1;
    cyl(ox+W/2,oz+D/2,oy,oy+bH,r);
    cyl(ox+W/2,oz+D/2,oy+bH,oy+bH+S.STUD_H,S.STUD_R);
  } else if(slope){
    // slope wedge: goes from PLATE height at front to bH at back
    const x0=ox,x1=ox+W,z0=oz,z1=oz+D;
    const yFront=oy+S.PLATE, yBack=oy+bH;
    // back face
    pt([0,0,1],[x0,oy,z1],[x1,oy,z1],[x1,yBack,z1]);pt([0,0,1],[x0,oy,z1],[x1,yBack,z1],[x0,yBack,z1]);
    // front face
    pt([0,0,-1],[x0,oy,z0],[x1,yFront,z0],[x1,oy,z0]);pt([0,0,-1],[x0,oy,z0],[x0,yFront,z0],[x1,yFront,z0]);
    // bottom
    pt([0,-1,0],[x0,oy,z0],[x1,oy,z1],[x0,oy,z1]);pt([0,-1,0],[x0,oy,z0],[x1,oy,z0],[x1,oy,z1]);
    // left
    pt([-1,0,0],[x0,oy,z0],[x0,oy,z1],[x0,yBack,z1]);pt([-1,0,0],[x0,oy,z0],[x0,yBack,z1],[x0,yFront,z0]);
    // right
    pt([1,0,0],[x1,oy,z0],[x1,yBack,z1],[x1,oy,z1]);pt([1,0,0],[x1,oy,z0],[x1,yFront,z0],[x1,yBack,z1]);
    // top slope
    const ny=Math.sin(Math.atan2(yBack-yFront,D)),nz2=-Math.cos(Math.atan2(yBack-yFront,D));
    pt([0,ny,nz2],[x0,yFront,z0],[x1,yBack,z1],[x1,yFront,z0]);pt([0,ny,nz2],[x0,yFront,z0],[x0,yBack,z1],[x1,yBack,z1]);
    // studs at back
    for(let xi=0;xi<sx;xi++){cyl(ox+(xi+0.5)*S.STUD,oz+S.STUD/2,oy+S.PLATE,oy+S.PLATE+S.STUD_H,S.STUD_R);}
  } else {
    // Bottom rim — open center (4 edge segments, no bottom face = real LEGO)
    box(ox,      oy, oz,      W,   wt, wt);
    box(ox,      oy, oz+D-wt, W,   wt, wt);
    box(ox,      oy, oz+wt,   wt,  wt, D-2*wt);
    box(ox+W-wt, oy, oz+wt,   wt,  wt, D-2*wt);
    // Four outer walls
    box(ox,      oy, oz,      wt,  bH, D);
    box(ox+W-wt, oy, oz,      wt,  bH, D);
    box(ox+wt,   oy, oz,      W-2*wt, bH, wt);
    box(ox+wt,   oy, oz+D-wt, W-2*wt, bH, wt);
    // Top plate
    box(ox, oy+bH-wt, oz, W, wt, D);
    // Studs
    for(let xi=0;xi<sx;xi++) for(let zi=0;zi<sz;zi++){
      cyl(ox+(xi+0.5)*S.STUD, oz+(zi+0.5)*S.STUD, oy+bH, oy+bH+S.STUD_H, S.STUD_R);
    }
    // Anti-stud tubes — identical logic to 3D editor
    if(hp===3){
      const ty0=oy+wt, ty1=oy+bH-wt;
      function stlTube(cx,cz){ tube(cx,cz,ty0,ty1,S.TUBE_R,S.TUBE_R-S.TUBE_W); }
      if(sx===1){
        for(let zi=1;zi<sz;zi++) stlTube(ox+0.5*S.STUD, oz+zi*S.STUD);
      } else {
        for(let xi=1;xi<sx;xi++) for(let zi=1;zi<sz;zi++) stlTube(ox+xi*S.STUD, oz+zi*S.STUD);
        if(sx===2){
          for(let zi=1;zi<sz;zi++){
            stlTube(ox+0.5*S.STUD, oz+zi*S.STUD);
            stlTube(ox+1.5*S.STUD, oz+zi*S.STUD);
          }
        }
      }
    }
  }
  return tris;
}

function dlBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

function exportSTL(){
  const en=Object.values(bData); if(!en.length){showToast(T('noStones'));return;}
  const tris=[];
  en.forEach(d=>tris.push(...brickTris(d,d.gx*S.STUD,layerY(d.gy),d.gz*S.STUD)));
  const buf=mkSTL(tris);
  dlBlob(new Blob([buf],{type:'application/octet-stream'}),'bricked_model.stl');
  showToast(`${T('stlDone')} — ${en.length} ${T('bricks')} · ${tris.length.toLocaleString()} ${T('tris')}`);
}

function exportPrintPlate(){
  const en=Object.values(bData); if(!en.length){showToast(T('noStones'));return;}
  const sorted=[...en].sort((a,b)=>a.type<b.type?-1:a.type>b.type?1:0);
  const tris=[];
  let cx=0,cz=0,rowZ=0;
  const GAP=2, WRAP=200;
  sorted.forEach(d=>{
    const w=d.sx*S.STUD, dep=d.sz*S.STUD;
    if(cx+w>WRAP&&cx>0){cx=0;cz=rowZ+GAP;}
    tris.push(...brickTris({...d,slope:d.slope,round:d.round},cx,0,cz));
    cx+=w+GAP; rowZ=Math.max(rowZ,cz+dep);
  });
  const buf=mkSTL(tris);
  dlBlob(new Blob([buf],{type:'application/octet-stream'}),'bricked_printplate.stl');
  showToast(`${T('plateDone')} — ${sorted.length} ${T('bricks')}`);
}

let toastT;
function showToast(msg,ms=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',ms);
}

init();
</script>
